<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>下班后 - AfterWork</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
  }
  #gameContainer {
    position: relative;
    width: 640px;
    height: 360px;
  }
  #gameCanvas {
    width: 640px;
    height: 360px;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    background: #000;
  }
  #touchControls {
    display: none;
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
  }
  .touch-btn {
    width: 50px;
    height: 50px;
    background:
      linear-gradient(90deg, transparent 0 5px, #596072 5px calc(100% - 5px), transparent calc(100% - 5px)),
      linear-gradient(90deg, transparent 0 3px, #252a3c 3px calc(100% - 3px), transparent calc(100% - 3px));
    border: 0;
    border-radius: 0;
    clip-path: polygon(5px 0, calc(100% - 5px) 0, 100% 5px, 100% calc(100% - 5px), calc(100% - 5px) 100%, 5px 100%, 0 calc(100% - 5px), 0 5px);
    box-shadow:
      0 0 0 3px #111522,
      4px 4px 0 #070913,
      inset 3px 3px 0 #7f879a,
      inset -3px -3px 0 #171b2a;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    color: rgba(255, 238, 204, 0.9);
    pointer-events: auto;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .touch-btn:active {
    transform: translate(2px, 2px);
    background:
      linear-gradient(90deg, transparent 0 5px, #6b7489 5px calc(100% - 5px), transparent calc(100% - 5px)),
      linear-gradient(90deg, transparent 0 3px, #31374d 3px calc(100% - 3px), transparent calc(100% - 3px));
    box-shadow:
      0 0 0 3px #111522,
      1px 1px 0 #070913,
      inset 2px 2px 0 #7f879a,
      inset -2px -2px 0 #171b2a;
  }
  #dpad {
    display: grid;
    grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 50px;
    gap: 5px;
    padding: 7px;
    border-radius: 16px;
    background: rgba(6, 8, 15, 0.38);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  }
  #dpad .up { grid-column: 2; grid-row: 1; }
  #dpad .left { grid-column: 1; grid-row: 2; }
  #dpad .right { grid-column: 3; grid-row: 2; }
  #dpad .down { grid-column: 2; grid-row: 3; }
  #actionBtn {
    width: 86px;
    height: 58px;
    border-radius: 0;
    clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px), calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 0;
    align-self: center;
    color: #ffe6a8;
    background:
      linear-gradient(90deg, transparent 0 8px, #ffd37a 8px calc(100% - 8px), transparent calc(100% - 8px)),
      linear-gradient(90deg, transparent 0 4px, #9e3e3f 4px calc(100% - 4px), transparent calc(100% - 4px));
    border: 0;
    text-shadow: 2px 2px 0 #5a1f2d;
    box-shadow:
      0 0 0 4px #3b1825,
      4px 4px 0 #090b14,
      inset 4px 4px 0 #f08d5b,
      inset -4px -4px 0 #632535;
  }
  #actionBtn:active {
    transform: translate(3px, 3px);
    background:
      linear-gradient(90deg, transparent 0 8px, #f3b95d 8px calc(100% - 8px), transparent calc(100% - 8px)),
      linear-gradient(90deg, transparent 0 4px, #7d3038 4px calc(100% - 4px), transparent calc(100% - 4px));
    box-shadow:
      0 0 0 4px #3b1825,
      1px 1px 0 #090b14,
      inset 2px 2px 0 #bf6849,
      inset -2px -2px 0 #4f1d2a;
  }
  @media (max-width: 700px) {
    body {
      align-items: flex-start;
      padding-top: max(8px, env(safe-area-inset-top));
      background: #121423;
    }
    #gameContainer {
      width: 100vw;
      height: calc(100vw * 9 / 16 + 150px + env(safe-area-inset-bottom));
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: calc(100vw * 9 / 16);
    }
    #touchControls {
      display: flex;
      top: calc(100vw * 9 / 16 + 8px);
      bottom: auto;
      left: 0;
      right: 0;
      min-height: calc(138px + env(safe-area-inset-bottom));
      padding: 8px 18px calc(12px + env(safe-area-inset-bottom));
      background:
        linear-gradient(180deg, rgba(45, 49, 66, 0.98), rgba(18, 20, 34, 0.98));
      border-top: 2px solid rgba(255, 210, 142, 0.22);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.05);
    }
  }
  @media (hover: none) and (pointer: coarse) {
    #touchControls { display: flex; }
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="320" height="180"></canvas>
  <div id="debugState" hidden></div>
  <div id="touchControls">
    <div id="dpad">
      <div class="touch-btn up" data-key="ArrowUp">↑</div>
      <div class="touch-btn left" data-key="ArrowLeft">←</div>
      <div class="touch-btn right" data-key="ArrowRight">→</div>
      <div class="touch-btn down" data-key="ArrowDown">↓</div>
    </div>
    <div class="touch-btn" id="actionBtn" data-key=" ">互动</div>
  </div>
</div>

<script>
// ==================== 游戏核心 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// 颜色调色板（像素风）
const COLORS = {
  black: '#000000',
  darkBlue: '#1a1a2e',
  navy: '#16213e',
  darkPurple: '#0f3460',
  orange: '#e94560',
  yellow: '#f5a623',
  green: '#4ecdc4',
  lightGreen: '#95e1d3',
  brown: '#8b4513',
  darkBrown: '#5d2906',
  wood: '#a0522d',
  lightWood: '#cd853f',
  skin: '#ffdab9',
  white: '#ffffff',
  gray: '#808080',
  lightGray: '#c0c0c0',
  red: '#ff4444',
  pink: '#ffb6c1',
  blue: '#4169e1',
  skyBlue: '#87ceeb',
  nightSky: '#0c1445',
  star: '#ffff99',
  wallColor: '#3d3d5c',
  floorColor: '#4a4a4a',
  carpet: '#8b0000'
};

const ASSET_DEFINITIONS = [
  { name: 'loader_probe', src: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAFklEQVR42mP8z8Dwn4GBgYGJgYGBgQEAFSoDfiCBQj8AAAAASUVORK5CYII=', required: true },
  { name: 'home_bg', src: 'assets/home_bg.png?v=art3' },
  { name: 'home_bed', src: 'assets/home_bed.png?v=art3' },
  { name: 'home_desk', src: 'assets/home_desk.png?v=art3' },
  { name: 'home_record', src: 'assets/home_record.png?v=art3' },
  { name: 'home_door', src: 'assets/home_door.png?v=art3' },
  { name: 'balcony_bg', src: 'assets/balcony_bg.png?v=art3' },
  { name: 'balcony_aquarium', src: 'assets/balcony_aquarium.png?v=art3' },
  { name: 'balcony_plant', src: 'assets/balcony_plant.png?v=art3' },
  { name: 'balcony_door', src: 'assets/balcony_door.png?v=art3' },
  { name: 'alley_bg', src: 'assets/alley_bg.png?v=art3' },
  { name: 'alley_stairs_up', src: 'assets/alley_stairs_up.png?v=art3' },
  { name: 'alley_stairs_down', src: 'assets/alley_stairs_down.png?v=art3' },
  { name: 'alley_bar_sign', src: 'assets/alley_bar_sign.png?v=art3' },
  { name: 'bar_bg', src: 'assets/bar_bg.png?v=art3' },
  { name: 'bar_counter', src: 'assets/bar_counter.png?v=art3' },
  { name: 'bar_shelf', src: 'assets/bar_shelf.png?v=art3' },
  { name: 'bar_table', src: 'assets/bar_table.png?v=art3' },
  { name: 'bar_bartender', src: 'assets/bar_bartender.png?v=art3' },
  { name: 'bar_customer', src: 'assets/bar_customer.png?v=art3' },
  { name: 'bar_door', src: 'assets/bar_door.png?v=art3' },
  { name: 'yard_bg', src: 'assets/yard_bg.png?v=art3' },
  { name: 'yard_bench', src: 'assets/yard_bench.png?v=art3' },
  { name: 'yard_oldchen', src: 'assets/yard_oldchen.png?v=art3' },
  { name: 'yard_ashtray', src: 'assets/yard_ashtray.png?v=art3' },
  { name: 'yard_door', src: 'assets/yard_door.png?v=art3' },
  { name: 'player_walk', src: 'assets/player_walk.png?v=art3', sprite: { frameW: 12, frameH: 16, directions: ['down', 'left', 'right', 'up'], frames: 2 } },
  { name: 'player_down', src: 'assets/player_down.png?v=art3' },
  { name: 'player_left', src: 'assets/player_left.png?v=art3' },
  { name: 'player_right', src: 'assets/player_right.png?v=art3' },
  { name: 'player_up', src: 'assets/player_up.png?v=art3' }
];

const AssetLoader = {
  images: {},
  meta: {},
  loaded: 0,
  failed: 0,
  total: 0,
  ready: false,
  started: false,

  loadAll(definitions, onComplete) {
    this.started = true;
    this.ready = false;
    this.loaded = 0;
    this.failed = 0;
    this.total = definitions.length;
    definitions.forEach(def => {
      this.meta[def.name] = def;
      const img = new Image();
      img.onload = () => this.finish(def.name, img, true, onComplete);
      img.onerror = () => this.finish(def.name, img, false, onComplete);
      img.src = def.src;
      this.images[def.name] = { img, ok: false, done: false, src: def.src };
    });
  },

  finish(name, img, ok, onComplete) {
    const entry = this.images[name];
    if (!entry || entry.done) return;
    entry.done = true;
    entry.ok = ok;
    if (ok) {
      this.loaded++;
      DebugLog.add('ASSET', `loaded ${name} ${img.naturalWidth}x${img.naturalHeight}`);
    } else {
      this.failed++;
      DebugLog.add('ASSET', `fallback ${name} src=${entry.src}`);
    }
    if (this.loaded + this.failed >= this.total) {
      this.ready = true;
      DebugLog.add('ASSET', `ready loaded=${this.loaded} failed=${this.failed}`);
      onComplete();
    }
  },

  has(name) {
    const entry = this.images[name];
    return !!(entry && entry.ok && entry.img.complete && entry.img.naturalWidth > 0);
  },

  draw(name, x, y, w, h) {
    if (!this.has(name)) return false;
    const img = this.images[name].img;
    ctx.drawImage(img, Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
    return true;
  },

  drawOrFallback(name, x, y, w, h, fallback) {
    if (this.draw(name, x, y, w, h)) return true;
    fallback();
    return false;
  },

  drawPlayer(player) {
    const x = Math.floor(player.x);
    const y = Math.floor(player.y);
    const sheet = this.meta.player_walk && this.meta.player_walk.sprite;
    if (sheet && this.has('player_walk')) {
      const img = this.images.player_walk.img;
      const dirIndex = Math.max(0, sheet.directions.indexOf(player.direction));
      const availableFrames = Math.max(1, Math.floor(img.naturalWidth / sheet.frameW));
      const frame = player.isMoving ? player.animFrame % Math.min(sheet.frames, availableFrames) : 0;
      const sx = frame * sheet.frameW;
      const sy = Math.min(dirIndex, Math.floor(img.naturalHeight / sheet.frameH) - 1) * sheet.frameH;
      ctx.drawImage(img, sx, sy, sheet.frameW, sheet.frameH, x, y, player.width, player.height);
      return true;
    }
    return this.draw(`player_${player.direction}`, x, y, player.width, player.height);
  },

  statusText() {
    if (!this.started) return '准备载入资源...';
    return `载入美术 ${this.loaded}/${this.total}，降级 ${this.failed}`;
  }
};

function drawLoadingScreen() {
  ctx.clearRect(0, 0, 320, 180);
  ctx.fillStyle = COLORS.darkBlue;
  ctx.fillRect(0, 0, 320, 180);
  ctx.fillStyle = COLORS.white;
  ctx.font = '10px monospace';
  ctx.fillText('下班后', 142, 70);
  ctx.font = '8px monospace';
  ctx.fillText(AssetLoader.statusText(), 95, 92);
  ctx.fillStyle = COLORS.gray;
  ctx.fillRect(90, 104, 140, 8);
  const progress = AssetLoader.total ? (AssetLoader.loaded + AssetLoader.failed) / AssetLoader.total : 0;
  ctx.fillStyle = COLORS.green;
  ctx.fillRect(90, 104, Math.floor(140 * progress), 8);
  AssetLoader.draw('loader_probe', 154, 120, 12, 12);
}

// ==================== 音频系统 ====================
const AudioSystem = {
  ctx: null,
  enabled: true,
  musicPlaying: false,
  musicOsc: null,
  musicGain: null,

  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      this.enabled = false;
    }
  },

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },

  // 播放简单音调
  playTone(freq, duration = 0.1, type = 'square', volume = 0.1) {
    if (!this.enabled || !this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  },

  // 脚步声
  playFootstep() {
    this.playTone(80 + Math.random() * 40, 0.05, 'square', 0.03);
  },

  // 交互音
  playInteract() {
    this.playTone(440, 0.1, 'sine', 0.1);
    setTimeout(() => this.playTone(660, 0.1, 'sine', 0.1), 50);
  },

  // 场景切换音
  playTransition() {
    this.playTone(330, 0.15, 'sine', 0.1);
    setTimeout(() => this.playTone(440, 0.15, 'sine', 0.1), 100);
    setTimeout(() => this.playTone(550, 0.15, 'sine', 0.1), 200);
  },

  // 唱片音乐（Lo-Fi 简单旋律）
  startMusic() {
    if (!this.enabled || !this.ctx || this.musicPlaying) return;
    this.musicPlaying = true;
    this.playMusicLoop();
  },

  stopMusic() {
    this.musicPlaying = false;
  },

  playMusicLoop() {
    if (!this.musicPlaying) return;
    const notes = [262, 294, 330, 349, 392, 349, 330, 294]; // C D E F E D
    const now = this.ctx.currentTime;
    notes.forEach((freq, i) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.value = 0.05;
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.3 + 0.25);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(now + i * 0.3);
      osc.stop(now + i * 0.3 + 0.3);
    });
    setTimeout(() => this.playMusicLoop(), notes.length * 300);
  },

  // 环境音（蟋蟀/夜晚）
  playAmbient() {
    if (!this.enabled || !this.ctx) return;
    const playCricket = () => {
      if (SceneManager.currentScene === 'balcony' || SceneManager.currentScene === 'yard') {
        this.playTone(4000 + Math.random() * 2000, 0.05, 'sine', 0.02);
        setTimeout(playCricket, 2000 + Math.random() * 3000);
      } else {
        setTimeout(playCricket, 5000);
      }
    };
    playCricket();
  }
};

// ==================== 输入系统 ====================
const Input = {
  keys: {},
  justPressed: {},
  touchActive: {},
  virtualPressCount: 0,
  lastVirtualKey: '',

  pressVirtualKey(key) {
    if (!this.keys[key]) {
      this.justPressed[key] = true;
    }
    this.keys[key] = true;
    this.touchActive[key] = true;
    this.virtualPressCount++;
    this.lastVirtualKey = key;
    AudioSystem.resume();
  },

  releaseVirtualKey(key) {
    this.keys[key] = false;
    this.touchActive[key] = false;
  },

  init() {
    document.addEventListener('keydown', (e) => {
      if (!this.keys[e.key]) {
        this.justPressed[e.key] = true;
      }
      this.keys[e.key] = true;
      AudioSystem.resume();
    });

    document.addEventListener('keyup', (e) => {
      this.keys[e.key] = false;
    });

    // 触屏控制
    document.querySelectorAll('.touch-btn').forEach(btn => {
      const key = btn.dataset.key;
      const start = (e) => {
        e.preventDefault();
        this.pressVirtualKey(key);
      };
      const end = (e) => {
        e.preventDefault();
        this.releaseVirtualKey(key);
      };
      btn.addEventListener('touchstart', start);
      btn.addEventListener('touchend', end);
      btn.addEventListener('touchcancel', end);
      btn.addEventListener('pointerdown', start);
      btn.addEventListener('pointerup', end);
      btn.addEventListener('pointercancel', end);
      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', end);
      btn.addEventListener('mouseleave', end);
    });

    // 点击互动
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = 320 / rect.width;
      const scaleY = 180 / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      Input.clickX = x;
      Input.clickY = y;
      Input.clicked = true;
      AudioSystem.resume();
    });
  },

  isDown(key) {
    return this.keys[key] || false;
  },

  wasPressed(key) {
    return this.justPressed[key] || false;
  },

  clearFrame() {
    this.justPressed = {};
    this.clicked = false;
  },

  getMovement() {
    let dx = 0, dy = 0;
    if (this.isDown('ArrowLeft') || this.isDown('a') || this.isDown('A')) dx -= 1;
    if (this.isDown('ArrowRight') || this.isDown('d') || this.isDown('D')) dx += 1;
    if (this.isDown('ArrowUp') || this.isDown('w') || this.isDown('W')) dy -= 1;
    if (this.isDown('ArrowDown') || this.isDown('s') || this.isDown('S')) dy += 1;
    return { dx, dy };
  },

  getActionPressed() {
    return this.wasPressed(' ') || this.wasPressed('Enter') || this.wasPressed('e') || this.wasPressed('E');
  }
};

// ==================== 存档系统 ====================
const SaveSystem = {
  save(data) {
    try {
      localStorage.setItem('afterwork_save', JSON.stringify(data));
    } catch(e) {}
  },

  load() {
    try {
      const data = localStorage.getItem('afterwork_save');
      return data ? JSON.parse(data) : null;
    } catch(e) {
      return null;
    }
  }
};

// ==================== 玩家 ====================
const Player = {
  x: 160,
  y: 120,
  width: 12,
  height: 16,
  speed: 1.5,
  direction: 'down', // up, down, left, right
  animFrame: 0,
  animTimer: 0,
  isMoving: false,
  stepTimer: 0,

  reset(x, y) {
    this.x = x;
    this.y = y;
    this.direction = 'down';
  },

  update() {
    const move = Input.getMovement();
    this.isMoving = move.dx !== 0 || move.dy !== 0;

    // 每 30 帧记录一次玩家状态
    if (!this._frameCounter) this._frameCounter = 0;
    this._frameCounter++;
    if (this._frameCounter % 30 === 0) {
      DebugLog.add('POS', `P(${Math.floor(this.x)},${Math.floor(this.y)}) input(${move.dx},${move.dy}) scene=${SceneManager.currentScene} transitioning=${SceneManager.transitioning} dialogue=${DialogueSystem.active} minigame=${MiniGame.active}`);
    }

    if (this.isMoving && !DialogueSystem.active && !MiniGame.active) {
      // 更新朝向
      if (move.dx < 0) this.direction = 'left';
      else if (move.dx > 0) this.direction = 'right';
      else if (move.dy < 0) this.direction = 'up';
      else if (move.dy > 0) this.direction = 'down';

      // 移动
      const newX = this.x + move.dx * this.speed;
      const newY = this.y + move.dy * this.speed;

      // 碰撞检测
      const hitX = this.checkCollision(newX, this.y);
      const hitY = this.checkCollision(this.x, newY);
      if (!hitX) { this.x = newX; }
      if (!hitY) { this.y = newY; }

      DebugLog.add('MV', `(${Math.floor(this.x)},${Math.floor(this.y)}) dir=${this.direction} colX=${hitX} colY=${hitY}`);

      // 边界限制
      this.x = Math.max(8, Math.min(312 - this.width, this.x));
      this.y = Math.max(8, Math.min(172 - this.height, this.y));

      // 动画
      this.animTimer++;
      if (this.animTimer > 8) {
        this.animTimer = 0;
        this.animFrame = (this.animFrame + 1) % 4;
      }

      // 脚步声
      this.stepTimer++;
      if (this.stepTimer > 15) {
        this.stepTimer = 0;
        AudioSystem.playFootstep();
      }
    } else {
      this.animFrame = 0;
      this.stepTimer = 0;
      if (move.dx !== 0 || move.dy !== 0) {
        DebugLog.add('STUCK', `input(${move.dx},${move.dy}) but blocked by dialogue/minigame/transition`);
      }
    }
  },

  checkCollision(x, y) {
    const scene = SceneManager.getCurrentScene();
    if (!scene || !scene.colliders) return false;
    for (const col of scene.colliders) {
      if (x < col.x + col.w && x + this.width > col.x &&
          y < col.y + col.h && y + this.height > col.y) {
        DebugLog.add('COL', `hit(${col.x},${col.y},${col.w}x${col.h}) at P(${Math.floor(x)},${Math.floor(y)})`);
        return true;
      }
    }
    return false;
  },

  draw() {
    const x = Math.floor(this.x);
    const y = Math.floor(this.y);
    if (AssetLoader.drawPlayer(this)) return;

    // 身体
    ctx.fillStyle = COLORS.blue;
    ctx.fillRect(x + 2, y + 6, 8, 8);

    // 头
    ctx.fillStyle = COLORS.skin;
    ctx.fillRect(x + 3, y, 6, 6);

    // 头发
    ctx.fillStyle = COLORS.darkBrown;
    ctx.fillRect(x + 3, y, 6, 2);

    // 眼睛
    ctx.fillStyle = COLORS.black;
    if (this.direction === 'down') {
      ctx.fillRect(x + 4, y + 3, 1, 1);
      ctx.fillRect(x + 7, y + 3, 1, 1);
    } else if (this.direction === 'up') {
      // 背面看不到眼睛
    } else if (this.direction === 'left') {
      ctx.fillRect(x + 4, y + 3, 1, 1);
    } else {
      ctx.fillRect(x + 7, y + 3, 1, 1);
    }

    // 腿（动画）
    ctx.fillStyle = COLORS.darkBlue;
    if (this.isMoving) {
      const legOffset = this.animFrame % 2 === 0 ? 0 : 1;
      ctx.fillRect(x + 3, y + 14, 2, 2 + legOffset);
      ctx.fillRect(x + 7, y + 14, 2, 2 + (1 - legOffset));
    } else {
      ctx.fillRect(x + 3, y + 14, 2, 2);
      ctx.fillRect(x + 7, y + 14, 2, 2);
    }
  }
};

// ==================== Debug 日志系统 (§DEBUG-9 + §WEB-1) ====================
const DebugLog = {
  lines: [],
  maxLines: 500,
  add(tag, msg) {
    const timestamp = Date.now() % 100000;
    const line = `[${timestamp}][${tag}] ${msg}`;
    this.lines.push(line);
    if (this.lines.length > this.maxLines) this.lines.shift();
  },
  draw() {
    // 不再在屏幕上绘制
  },
  export() {
    return this.lines.join('\n');
  },
  download() {
    const content = this.export();
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const filename = `afterwork_debug_${timestamp}.txt`;
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
    this.add('LOG', `downloaded ${filename} (${this.lines.length} lines)`);
  }
};

// ==================== 场景管理 ====================
const SceneManager = {
  currentScene: 'home',
  scenes: {},
  transitionAlpha: 0,
  transitioning: false,
  transitionTarget: null,
  transitionSpawn: null,
  sceneSwitched: false,
  exitCooldown: 0,

  register(name, scene) {
    this.scenes[name] = scene;
  },

  getCurrentScene() {
    return this.scenes[this.currentScene];
  },

  transitionTo(sceneName, spawnX, spawnY) {
    if (this.transitioning) {
      DebugLog.add('WARN', `transition blocked: already transitioning to ${this.transitionTarget}`);
      return;
    }
    DebugLog.add('GO', `transitionTo(${sceneName}, ${spawnX}, ${spawnY}) from=${this.currentScene}`);
    this.transitioning = true;
    this.transitionTarget = sceneName;
    this.transitionSpawn = { x: spawnX, y: spawnY };
    this.transitionAlpha = 0;
    this.sceneSwitched = false;
    AudioSystem.playTransition();
  },

  update() {
    if (this.transitioning) {
      this.transitionAlpha += 0.05;
      if (this.transitionAlpha >= 1 && !this.sceneSwitched) {
        // 切换场景（只执行一次）
        const prevScene = this.currentScene;
        this.currentScene = this.transitionTarget;
        Player.reset(this.transitionSpawn.x, this.transitionSpawn.y);
        SaveSystem.save({ scene: this.currentScene, x: Player.x, y: Player.y });
        this.transitionTarget = null;
        this.exitCooldown = 90;
        this.sceneSwitched = true;
        DebugLog.add('SCENE', `${prevScene}→${this.currentScene} spawn(${this.transitionSpawn.x},${this.transitionSpawn.y})`);
      }
      if (this.transitionAlpha >= 2) {
        this.transitioning = false;
        this.transitionAlpha = 0;
      }
    }
    if (this.exitCooldown > 0) {
      this.exitCooldown--;
    }
  },

  draw() {
    const scene = this.getCurrentScene();
    if (scene) {
      DebugLog.add('DRAW', `scene=${this.currentScene}`);
      scene.draw();
    } else {
      DebugLog.add('WARN', `no scene found for ${this.currentScene}`);
    }

    // 过渡效果
    if (this.transitioning) {
      const alpha = this.transitionAlpha <= 1 ? this.transitionAlpha : 2 - this.transitionAlpha;
      ctx.fillStyle = `rgba(0, 0, 0, ${alpha})`;
      ctx.fillRect(0, 0, 320, 180);
    }
  }
};

// ==================== 对话系统 ====================
const DialogueSystem = {
  active: false,
  lines: [],
  currentLine: 0,
  speaker: '',
  displayText: '',
  charIndex: 0,
  charTimer: 0,
  choices: null,
  choiceSelection: 0,

  start(speaker, lines) {
    this.active = true;
    this.speaker = speaker;
    this.lines = lines;
    this.currentLine = 0;
    this.displayText = '';
    this.charIndex = 0;
    this.choices = null;
    this.choiceSelection = 0;
    AudioSystem.playInteract();
  },

  setChoices(choices) {
    this.choices = choices;
    this.choiceSelection = 0;
  },

  update() {
    if (!this.active) return;

    // 有选项时处理选择
    if (this.choices && this.charIndex >= this.lines[this.currentLine].length) {
      if (Input.wasPressed('ArrowUp') || Input.wasPressed('w') || Input.wasPressed('W')) {
        this.choiceSelection = (this.choiceSelection - 1 + this.choices.length) % this.choices.length;
      }
      if (Input.wasPressed('ArrowDown') || Input.wasPressed('s') || Input.wasPressed('S')) {
        this.choiceSelection = (this.choiceSelection + 1) % this.choices.length;
      }
      if (Input.getActionPressed()) {
        const chosen = this.choices[this.choiceSelection];
        this.active = false;
        this.choices = null;
        // 通知场景执行选择
        if (window.onDialogueChoice) {
          window.onDialogueChoice(chosen);
        }
      }
      return;
    }

    // 文字逐字显示
    this.charTimer++;
    if (this.charTimer > 2) {
      this.charTimer = 0;
      if (this.charIndex < this.lines[this.currentLine].length) {
        this.displayText += this.lines[this.currentLine][this.charIndex];
        this.charIndex++;
      }
    }

    // 继续对话
    if (Input.getActionPressed()) {
      if (this.charIndex < this.lines[this.currentLine].length) {
        // 快速显示完整文字
        this.displayText = this.lines[this.currentLine];
        this.charIndex = this.lines[this.currentLine].length;
      } else {
        // 下一句
        this.currentLine++;
        if (this.currentLine >= this.lines.length) {
          this.active = false;
        } else {
          this.displayText = '';
          this.charIndex = 0;
        }
        AudioSystem.playInteract();
      }
    }
  },

  draw() {
    if (!this.active) return;

    // 对话框背景
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.fillRect(20, 130, 280, 45);
    ctx.strokeStyle = COLORS.white;
    ctx.lineWidth = 1;
    ctx.strokeRect(20, 130, 280, 45);

    // 说话人
    ctx.fillStyle = COLORS.yellow;
    ctx.font = '8px monospace';
    ctx.fillText(this.speaker, 25, 142);

    // 对话内容
    ctx.fillStyle = COLORS.white;
    ctx.font = '8px monospace';
    const text = this.displayText;
    // 自动换行
    const maxWidth = 265;
    let line = '';
    let y = 155;
    for (let i = 0; i < text.length; i++) {
      const testLine = line + text[i];
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth) {
        ctx.fillText(line, 25, y);
        line = text[i];
        y += 10;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line, 25, y);

    // 选项
    if (this.choices && this.charIndex >= this.lines[this.currentLine].length) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
      ctx.fillRect(20, 100, 280, 30);
      ctx.strokeStyle = COLORS.yellow;
      ctx.strokeRect(20, 100, 280, 30);

      this.choices.forEach((choice, i) => {
        const x = 30 + i * 90;
        ctx.fillStyle = i === this.choiceSelection ? COLORS.yellow : COLORS.white;
        ctx.font = '7px monospace';
        ctx.fillText(choice.text, x, 118);
      });
    } else if (this.charIndex >= this.lines[this.currentLine].length) {
      // 继续提示
      ctx.fillStyle = COLORS.white;
      ctx.fillText('▼', 290, 168);
    }
  }
};

// ==================== 迷你游戏系统 ====================
const MiniGame = {
  active: false,
  type: null, // 'cards' or 'mixdrink'
  state: {},

  start(type) {
    this.active = true;
    this.type = type;
    if (type === 'cards') {
      this.state = {
        playerCard: Math.floor(Math.random() * 13) + 1,
        dealerCard: Math.floor(Math.random() * 13) + 1,
        phase: 'betting', // betting, result
        result: '',
        selection: 0
      };
    } else if (type === 'mixdrink') {
      this.state = {
        step: 0, // 0: select base, 1: select mixer, 2: done
        base: 0,
        mixer: 0,
        selection: 0,
        bases: ['伏特加', '朗姆酒', '金酒', '威士忌'],
        mixers: ['可乐', '橙汁', '苏打水', '汤力水']
      };
    }
    AudioSystem.playInteract();
  },

  update() {
    if (!this.active) return;

    if (this.type === 'cards') {
      this.updateCards();
    } else if (this.type === 'mixdrink') {
      this.updateMixDrink();
    }
  },

  updateCards() {
    const state = this.state;

    if (state.phase === 'betting') {
      if (Input.wasPressed('ArrowUp') || Input.wasPressed('w') || Input.wasPressed('W')) {
        state.selection = 0;
      }
      if (Input.wasPressed('ArrowDown') || Input.wasPressed('s') || Input.wasPressed('S')) {
        state.selection = 1;
      }
      if (Input.getActionPressed()) {
        if (state.selection === 0) {
          // 出牌
          state.phase = 'result';
          if (state.playerCard > state.dealerCard) {
            state.result = '你赢了！';
          } else if (state.playerCard < state.dealerCard) {
            state.result = '你输了...';
          } else {
            state.result = '平局！';
          }
          AudioSystem.playInteract();
        } else {
          // 退出
          this.active = false;
        }
      }
    } else if (state.phase === 'result') {
      if (Input.getActionPressed()) {
        // 重新开始或退出
        state.phase = 'betting';
        state.playerCard = Math.floor(Math.random() * 13) + 1;
        state.dealerCard = Math.floor(Math.random() * 13) + 1;
        state.result = '';
      }
    }
  },

  updateMixDrink() {
    const state = this.state;

    if (state.step === 0) {
      // 选基酒
      if (Input.wasPressed('ArrowLeft') || Input.wasPressed('a') || Input.wasPressed('A')) {
        state.selection = (state.selection - 1 + 4) % 4;
      }
      if (Input.wasPressed('ArrowRight') || Input.wasPressed('d') || Input.wasPressed('D')) {
        state.selection = (state.selection + 1) % 4;
      }
      if (Input.getActionPressed()) {
        state.base = state.selection;
        state.step = 1;
        state.selection = 0;
        AudioSystem.playInteract();
      }
    } else if (state.step === 1) {
      // 选配料
      if (Input.wasPressed('ArrowLeft') || Input.wasPressed('a') || Input.wasPressed('A')) {
        state.selection = (state.selection - 1 + 4) % 4;
      }
      if (Input.wasPressed('ArrowRight') || Input.wasPressed('d') || Input.wasPressed('D')) {
        state.selection = (state.selection + 1) % 4;
      }
      if (Input.getActionPressed()) {
        state.mixer = state.selection;
        state.step = 2;
        AudioSystem.playInteract();
      }
    } else if (state.step === 2) {
      // 完成
      if (Input.getActionPressed()) {
        this.active = false;
      }
    }

    if (Input.wasPressed('Escape')) {
      this.active = false;
    }
  },

  draw() {
    if (!this.active) return;

    // 背景遮罩
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.fillRect(0, 0, 320, 180);

    if (this.type === 'cards') {
      this.drawCards();
    } else if (this.type === 'mixdrink') {
      this.drawMixDrink();
    }
  },

  drawCards() {
    const state = this.state;

    // 标题
    ctx.fillStyle = COLORS.yellow;
    ctx.font = '10px monospace';
    ctx.fillText('比大小', 140, 30);

    // 玩家牌
    ctx.fillStyle = COLORS.white;
    ctx.fillRect(80, 50, 40, 50);
    ctx.fillStyle = COLORS.black;
    ctx.font = '16px monospace';
    ctx.fillText(this.getCardName(state.playerCard), 92, 80);

    // 庄家牌
    ctx.fillStyle = COLORS.white;
    ctx.fillRect(200, 50, 40, 50);
    ctx.fillStyle = COLORS.black;
    ctx.font = '16px monospace';
    ctx.fillText(this.getCardName(state.dealerCard), 212, 80);

    // 标签
    ctx.fillStyle = COLORS.white;
    ctx.font = '8px monospace';
    ctx.fillText('你', 95, 110);
    ctx.fillText('庄家', 210, 110);

    if (state.phase === 'betting') {
      ctx.fillStyle = COLORS.white;
      ctx.font = '8px monospace';
      ctx.fillText('出牌', 150, 135);
      ctx.fillText('退出', 150, 150);

      // 选择框
      const selY = state.selection === 0 ? 130 : 145;
      ctx.strokeStyle = COLORS.yellow;
      ctx.strokeRect(140, selY, 40, 10);
    } else if (state.phase === 'result') {
      ctx.fillStyle = COLORS.yellow;
      ctx.font = '10px monospace';
      ctx.fillText(state.result, 130, 140);
      ctx.fillStyle = COLORS.white;
      ctx.font = '8px monospace';
      ctx.fillText('按空格继续', 120, 160);
    }
  },

  getCardName(value) {
    if (value === 1) return 'A';
    if (value === 11) return 'J';
    if (value === 12) return 'Q';
    if (value === 13) return 'K';
    return value.toString();
  },

  drawMixDrink() {
    const state = this.state;

    ctx.fillStyle = COLORS.yellow;
    ctx.font = '10px monospace';
    ctx.fillText('调酒', 145, 25);

    if (state.step === 0) {
      ctx.fillStyle = COLORS.white;
      ctx.font = '8px monospace';
      ctx.fillText('选择基酒:', 130, 45);

      state.bases.forEach((base, i) => {
        const x = 60 + i * 55;
        ctx.fillStyle = i === state.selection ? COLORS.yellow : COLORS.white;
        ctx.fillText(base, x, 70);
      });

      ctx.fillStyle = COLORS.lightGray;
      ctx.fillText('← → 选择  空格 确认', 90, 150);
    } else if (state.step === 1) {
      ctx.fillStyle = COLORS.white;
      ctx.font = '8px monospace';
      ctx.fillText('选择配料:', 130, 45);

      state.mixers.forEach((mixer, i) => {
        const x = 60 + i * 55;
        ctx.fillStyle = i === state.selection ? COLORS.yellow : COLORS.white;
        ctx.fillText(mixer, x, 70);
      });

      ctx.fillStyle = COLORS.lightGray;
      ctx.fillText('← → 选择  空格 确认', 90, 150);
    } else if (state.step === 2) {
      ctx.fillStyle = COLORS.green;
      ctx.font = '10px monospace';
      ctx.fillText('调好了！', 130, 60);

      ctx.fillStyle = COLORS.white;
      ctx.font = '8px monospace';
      ctx.fillText(`${state.bases[state.base]} + ${state.mixers[state.mixer]}`, 100, 90);

      ctx.fillStyle = COLORS.lightGray;
      ctx.fillText('按空格继续', 125, 130);
    }
  }
};

  draw() {
    if (this.drawArt()) {
      this.drawHints();
      return;
    }

    // 楼梯间墙面
    ctx.fillStyle = '#2f3145';
    ctx.fillRect(0, 0, 320, 180);

    // 平台
    ctx.fillStyle = COLORS.floorColor;
    ctx.fillRect(24, 34, 238, 18);
    ctx.fillRect(24, 82, 238, 18);

    ctx.fillRect(24, 160, 238, 12);

    // 右侧门洞：最上面是家门，最下面是酒吧门
    this.drawDoor(252, 10, 34, 28, '家');
    this.drawDoor(252, 140, 34, 32, 'BAR');

    // 折返楼梯，按用户草图从下往上连到家门
    this.drawStairRun([
      [55, 160], [75, 147], [98, 141], [124, 133], [152, 126], [232, 126]
    ]);
    this.drawStairRun([
      [42, 126], [60, 112], [83, 102], [108, 94], [138, 88], [236, 88]
    ]);
    this.drawStairRun([
      [44, 82], [64, 70], [86, 58], [113, 49], [145, 42], [236, 42]
    ]);

    // 扶手和平台边
    ctx.strokeStyle = COLORS.lightGray;
    ctx.lineWidth = 2;
    [[24, 34, 248, 34], [24, 52, 238, 52], [24, 82, 248, 82], [24, 100, 238, 100], [24, 126, 248, 126], [24, 144, 238, 144], [24, 172, 248, 172]].forEach(line => {
      ctx.beginPath();
      ctx.moveTo(line[0], line[1]);
      ctx.lineTo(line[2], line[3]);
      ctx.stroke();
    });

    // 提示
    this.drawHints();
  },

  drawDoor(x, y, w, h, label) {
    ctx.fillStyle = COLORS.darkBrown;
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = COLORS.wood;
    ctx.fillRect(x + 4, y + 4, w - 8, h - 4);
    ctx.fillStyle = COLORS.yellow;
    ctx.fillRect(x + w - 8, y + Math.floor(h / 2), 2, 2);
    ctx.fillStyle = COLORS.white;
    ctx.font = '6px monospace';
    ctx.fillText(label, x + 8, y + h - 6);
  },

  drawStairRun(points) {
    ctx.strokeStyle = COLORS.darkBrown;
    ctx.lineWidth = 8;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    points.forEach((point, i) => {
      if (i === 0) ctx.moveTo(point[0], point[1]);
      else ctx.lineTo(point[0], point[1]);
    });
    ctx.stroke();

    ctx.strokeStyle = COLORS.lightWood;
    ctx.lineWidth = 2;
    points.forEach((point, i) => {
      if (i === 0) return;
      const prev = points[i - 1];
      const steps = Math.max(2, Math.floor(Math.hypot(point[0] - prev[0], point[1] - prev[1]) / 9));
      for (let s = 1; s < steps; s++) {
        const t = s / steps;
        const x = prev[0] + (point[0] - prev[0]) * t;
        const y = prev[1] + (point[1] - prev[1]) * t;
        ctx.beginPath();
        ctx.moveTo(x - 4, y + 2);
        ctx.lineTo(x + 4, y - 2);
        ctx.stroke();
      }
    });
    ctx.lineJoin = 'miter';
  },

  drawHints() {
    if (Player.x > 230 && Player.y < 55) {
      ctx.fillStyle = COLORS.yellow;
      ctx.font = '8px monospace';
      ctx.fillText('回家', 242, 48);

    if (Player.x > 230 && Player.y > 126) {
      ctx.fillStyle = COLORS.yellow;
      ctx.font = '8px monospace';
      ctx.fillText('进酒吧', 236, 136);
    }
  },

  update() {
    if (SceneManager.exitCooldown === 0) {
      for (const exit of this.exits) {
        const overlap = Player.x + Player.width > exit.x && Player.x < exit.x + exit.w &&
            Player.y + Player.height > exit.y && Player.y < exit.y + exit.h;
        DebugLog.add('EXIT', `scene=alley exit→${exit.target} overlap=${overlap} P(${Math.floor(Player.x)},${Math.floor(Player.y)}) E(${exit.x},${exit.y},${exit.w}x${exit.h})`);
        if (overlap) {
          SceneManager.transitionTo(exit.target, exit.spawnX, exit.spawnY);
          break;
        }
      }
    } else {
      DebugLog.add('EXIT', `cooldown=${SceneManager.exitCooldown}`);
    }
  }
};

    AssetLoader.drawOrFallback('yard_door', 32, 80, 15, 30, () => {
      ctx.fillStyle = COLORS.darkBrown;
      ctx.fillRect(32, 80, 15, 30);
    });
    return true;
  },

  draw() {
    if (this.drawArt()) {
      this.drawHints();
      return;
    }

    // 夜空
    ctx.fillStyle = COLORS.nightSky;
    ctx.fillRect(0, 0, 320, 180);

    // 星星
    ctx.fillStyle = COLORS.star;
    for (let i = 0; i < 30; i++) {
      const x = (i * 41) % 320;
      const y = (i * 19) % 80;
      ctx.fillRect(x, y, 1, 1);
    }

    // 月亮
    ctx.fillStyle = COLORS.yellow;
    ctx.beginPath();
    ctx.arc(260, 40, 15, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COLORS.nightSky;
    ctx.beginPath();
    ctx.arc(255, 38, 12, 0, Math.PI * 2);
    ctx.fill();

    // 地面
    ctx.fillStyle = COLORS.gray;
    ctx.fillRect(0, 120, 320, 60);

    // 围墙
    ctx.fillStyle = COLORS.darkBrown;
    ctx.fillRect(0, 100, 320, 20);
    for (let i = 0; i < 16; i++) {
      ctx.fillRect(i * 20, 95, 15, 5);
    }

    // 长椅
    ctx.fillStyle = COLORS.brown;
    ctx.fillRect(100, 75, 40, 5);
    ctx.fillRect(102, 80, 3, 15);
    ctx.fillRect(135, 80, 3, 15);
    ctx.fillRect(100, 70, 40, 3);

    // NPC（老陈）
    ctx.fillStyle = COLORS.darkBlue;
    ctx.fillRect(113, 75, 8, 10);
    ctx.fillStyle = COLORS.skin;
    ctx.fillRect(114, 70, 6, 5);
    ctx.fillStyle = COLORS.gray;
    ctx.fillRect(114, 68, 6, 2);

    // 烟
    ctx.fillStyle = COLORS.white;
    ctx.fillRect(122, 72, 4, 1);
    // 烟雾
    ctx.fillStyle = 'rgba(200, 200, 200, 0.5)';
    ctx.fillRect(126, 70, 3, 3);
    ctx.fillRect(129, 68, 2, 2);

    // 烟灰缸
    ctx.fillStyle = COLORS.gray;
    ctx.fillRect(200, 105, 20, 10);
    ctx.fillStyle = COLORS.darkBrown;
    ctx.fillRect(202, 107, 16, 6);

    // 门（回酒吧）
    ctx.fillStyle = COLORS.darkBrown;
    ctx.fillRect(32, 80, 15, 30);

    // 提示
    this.drawHints();
  },

  drawHints() {
    if (Player.x < 140 && Player.x > 95 && Player.y < 100 && Player.y > 65) {
      ctx.fillStyle = COLORS.yellow;
      ctx.font = '8px monospace';
      ctx.fillText('按空格聊天', 95, 65);
    }

    if (Player.x < 55 && Player.y < 120 && Player.y > 70) {
      ctx.fillStyle = COLORS.yellow;
      ctx.font = '8px monospace';
      ctx.fillText('回酒吧', 35, 75);
    }
  },

  update() {
    // NPC对话树
    if (Input.getActionPressed() && Player.x < 140 && Player.x > 95 && Player.y < 100 && Player.y > 65) {
      if (!DialogueSystem.active) {
        const node = this.dialogueTree[this.currentNode];
        if (node && node.choices.length > 0) {
          // 显示对话，结束后弹出选择
          DialogueSystem.start(node.speaker, [node.line]);
          this.pendingChoices = node.choices;
        } else if (node) {
          // 终点，重置
          DialogueSystem.start(node.speaker, [node.line]);
          this.currentNode = 'start';
        }
      }
    }

    // 对话结束后弹出选项
    if (!DialogueSystem.active && this.pendingChoices && this.pendingChoices.length > 0) {
      DialogueSystem.setChoices(this.pendingChoices);
      this.pendingChoices = null;
    }

    // 出口（带冷却）
    if (SceneManager.exitCooldown === 0) {
      for (const exit of this.exits) {
        if (Player.x + Player.width > exit.x && Player.x < exit.x + exit.w &&
            Player.y + Player.height > exit.y && Player.y < exit.y + exit.h) {
          SceneManager.transitionTo(exit.target, exit.spawnX, exit.spawnY);
          break;
        }
      }
    }
  }
};

// ==================== 初始化 ====================
let gameStarted = false;

window.AfterWorkDebug = {
  getState() {
    return {
      gameStarted,
      assetReady: AssetLoader.ready,
      loaded: AssetLoader.loaded,
      failed: AssetLoader.failed,
      total: AssetLoader.total,
      currentScene: SceneManager.currentScene,
      player: { x: Player.x, y: Player.y, direction: Player.direction },
      dialogueActive: DialogueSystem.active,
      minigameActive: MiniGame.active,
      touch: { virtualPressCount: Input.virtualPressCount, lastVirtualKey: Input.lastVirtualKey },
      imageRendering: getComputedStyle(canvas).imageRendering,
      debugTail: DebugLog.lines.slice(-12)
    };
  }
};

function getDebugState() {
  return window.AfterWorkDebug.getState();
}

function publishDebugState() {
  const el = document.getElementById('debugState');
  if (el) {
    el.textContent = JSON.stringify(getDebugState());
  }
}

function getDebugStart() {
  const params = new URLSearchParams(window.location.search);
  const scene = params.get('debugScene');
  if (!scene || !SceneManager.scenes[scene]) return null;
  return {
    scene,
    x: Number(params.get('debugX') || 160),
    y: Number(params.get('debugY') || 120)
  };
}

function init() {
  AudioSystem.init();
  Input.init();

  // 注册场景
  SceneManager.register('home', sceneHome);
  SceneManager.register('balcony', sceneBalcony);
  SceneManager.register('alley', sceneAlley);
  SceneManager.register('bar', sceneBar);
  SceneManager.register('yard', sceneYard);

  // 全局对话选择处理
  window.onDialogueChoice = function(chosen) {
    if (SceneManager.currentScene === 'yard' && chosen && chosen.next) {
      sceneYard.currentNode = chosen.next;
    }
  };

  // 加载存档；debugScene 只用于自动验收指定起点
  const debugStart = getDebugStart();
  const save = debugStart || SaveSystem.load();
  if (save && save.scene) {
    SceneManager.currentScene = save.scene;
    Player.reset(save.x || 160, save.y || 120);
  }

  AssetLoader.loadAll(ASSET_DEFINITIONS, startGame);
  loadingLoop();
}

function startGame() {
  if (gameStarted) return;
  gameStarted = true;

  // 开始环境音
  setTimeout(() => AudioSystem.playAmbient(), 1000);

  // 开始游戏循环
  gameLoop();
}

function loadingLoop() {
  drawLoadingScreen();
  publishDebugState();
  if (!AssetLoader.ready) {
    requestAnimationFrame(loadingLoop);
  }
}

// ==================== 游戏循环 ====================
function gameLoop() {
  // 调试：按 L 键下载日志 (§DEBUG-9 + §WEB-1)
  if (Input.wasPressed('l') || Input.wasPressed('L')) {
    DebugLog.download();
  }

  // 更新
  if (!SceneManager.transitioning) {
    Player.update();
    const scene = SceneManager.getCurrentScene();
    if (scene && scene.update) {
      scene.update();
    }
    DialogueSystem.update();
    MiniGame.update();
  }
  SceneManager.update();

  // 绘制
  ctx.clearRect(0, 0, 320, 180);
  SceneManager.draw();
  if (!SceneManager.transitioning) {
    const scene = SceneManager.getCurrentScene();
    if (scene) {
      Player.draw();
    }
    DialogueSystem.draw();
    MiniGame.draw();
  }

  // Debug overlay (§DEBUG-9 + §WEB-1)
  DebugLog.draw();
  publishDebugState();

  // 清除输入状态
  Input.clearFrame();

  requestAnimationFrame(gameLoop);
}

// 启动
init();
</script>
