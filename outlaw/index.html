<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, viewport-fit=cover">
    <title>EchoGreybox</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <main id="unity-container">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
      <div id="unity-loading-bar" role="status" aria-label="游戏加载中">
        <div id="unity-progress-bar"><div id="unity-progress-bar-full"></div></div>
      </div>
      <div id="unity-warning"></div>
      <button id="unity-fullscreen-button" type="button" aria-label="全屏">⛶</button>
    </main>
    <script>
      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(message, type) {
        const item = document.createElement("div");
        item.textContent = message;
        item.className = type || "warning";
        warningBanner.appendChild(item);
        warningBanner.hidden = false;
        if (type !== "error") setTimeout(() => {
          item.remove();
          warningBanner.hidden = !warningBanner.children.length;
        }, 5000);
      }

      // 保持设计分辨率 16:10，尽可能占满可用区域；窗口变化时重新计算，既不裁切也不拉伸。
      function resizeCanvas() {
        const designWidth = 960;
        const designHeight = 600;
        const scale = Math.min(window.innerWidth / designWidth, window.innerHeight / designHeight);
        canvas.style.width = `${Math.max(1, Math.floor(designWidth * scale))}px`;
        canvas.style.height = `${Math.max(1, Math.floor(designHeight * scale))}px`;
      }
      window.addEventListener("resize", resizeCanvas, { passive: true });
      window.addEventListener("orientationchange", resizeCanvas, { passive: true });
      resizeCanvas();

      const buildUrl = "Build";
      // 同一端口迭代时也让浏览器重新取本轮产物；仍以更换端口作为最终人验主路径（§WEB W5）。
      const buildRevision = "plan05-echo20-v3";
      const cacheBuster = `?rev=${buildRevision}`;
      const loaderUrl = buildUrl + "/WebGL.loader.js" + cacheBuster;
      const config = {
        dataUrl: buildUrl + "/WebGL.data.unityweb" + cacheBuster,
        frameworkUrl: buildUrl + "/WebGL.framework.js.unityweb" + cacheBuster,
        codeUrl: buildUrl + "/WebGL.wasm.unityweb" + cacheBuster,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "OutLawTeam",
        productName: "EchoGreybox",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      loadingBar.hidden = false;
      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => createUnityInstance(canvas, config, progress => {
        progressBarFull.style.width = `${100 * progress}%`;
      }).then(unityInstance => {
        loadingBar.hidden = true;
        fullscreenButton.onclick = () => unityInstance.SetFullscreen(1);
      }).catch(message => unityShowBanner(message, "error"));
      document.body.appendChild(script);
    </script>
  </body>
</html>
